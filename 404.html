// Redirige 404 de GitHub Pages al index con la ruta en el query string

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Redirige 404 de GitHub Pages al index con la ruta en el query string
      var l = window.location;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || ''));
    </script>
  </head>
</html>
