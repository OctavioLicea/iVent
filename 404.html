<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- app/public/404.html -->
    <!-- Cambio: SPA redirect handler para GitHub Pages -->
    <!-- 2026-06-13 10:35 -->
    <script>
      var l = window.location;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || ''));
    </script>
  </head>
</html>
