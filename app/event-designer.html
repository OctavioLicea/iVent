<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iVent — Event Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-size:15px;height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#1A1714;display:flex;flex-direction:column;}

:root{
  --gold:#C4973A;--gold-light:#F5EDD8;--gold-dark:#9C7520;
  --ink:#1A1714;--ink-mid:#4A4540;--ink-mute:#8A837A;
  --border:#E8E4DE;--border-strong:#D0C9C0;
  --surface:#FFFFFF;--surface-warm:#FAFAF9;--surface-section:#F7F5F2;
  --red:#C0392B;--red-light:#FDF0EF;--green:#2D7A4F;
  --topnav:#1A1714;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;--font-serif:'Cormorant Garamond',serif;
  /* Event palette */
  --ev-primary:#7D2935;--ev-primary-dark:#561820;--ev-primary-mid:#A34455;--ev-primary-light:#F3E8EA;
  --ev-accent:#9C6B2E;--ev-accent-light:#F7F0E3;
  --ev-surface:#FAF7F2;--ev-surface2:#F2EBE0;--ev-kraft:#EDE0CB;
  --ev-ink:#2A1F1A;--ev-ink-mute:#9C8878;--ev-border:rgba(90,50,30,0.12);
  --ev-sage-light:#EBF0E8;
  --frame-inv:#EDE0CB;--frame-nav:var(--ev-surface);--frame-qr:#F2EBE0;
  /* #4 — maps default cambiado a Marino & Oro */
  --frame-maps-a:#1B2C4E;--frame-maps-b:#C4973A;
}

/* ── TOPNAV dark OCLA── */
.topnav{
  height:56px;background:var(--topnav);
  border-bottom:1px solid rgba(196,151,58,0.15);
  display:flex;align-items:center;padding:0 24px;gap:12px;
  position:sticky;top:0;z-index:200;overflow:hidden;flex-shrink:0;
}
.topnav::before{content:'';position:absolute;top:-40px;right:80px;width:160px;height:160px;border-radius:50%;border:1px solid rgba(196,151,58,0.08);pointer-events:none;}
.topnav::after{content:'';position:absolute;bottom:-60px;right:220px;width:120px;height:120px;border-radius:50%;border:1px solid rgba(196,151,58,0.06);pointer-events:none;}
.logo{font-family:var(--font);font-weight:600;font-size:18px;color:#F0EDE8;letter-spacing:-.02em;text-decoration:none;position:relative;z-index:1;}
.logo span{color:var(--gold);}
.topnav-sep{width:1px;height:20px;background:rgba(255,255,255,0.1);position:relative;z-index:1;}
.topnav-event-name{font-size:13px;color:rgba(255,255,255,0.45);position:relative;z-index:1;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topnav-spacer{flex:1;}

/* #1 — user chip en topnav */
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 5px;border:1px solid rgba(255,255,255,0.1);border-radius:30px;background:transparent;position:relative;z-index:1;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:rgba(196,151,58,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--gold);flex-shrink:0;}
.user-email{font-size:12px;color:rgba(255,255,255,0.5);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* #2 — back button */
.topnav-back{font-size:12px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;font-family:var(--font);padding:6px 10px;border-radius:var(--radius);transition:color .15s,background .15s;position:relative;z-index:1;display:flex;align-items:center;gap:6px;}
.topnav-back:hover{color:#F0EDE8;background:rgba(255,255,255,0.06);}

.btn-save{padding:8px 18px;background:var(--gold);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s;position:relative;z-index:1;letter-spacing:.01em;}
.btn-save:hover{background:var(--gold-dark);}
.saved-msg{font-size:12px;color:#4CAF89;position:relative;z-index:1;opacity:0;transition:opacity .3s;}
.saved-msg.show{opacity:1;}

/* ── 3-COLUMN LAYOUT ── */
.workspace{display:grid;grid-template-columns:200px 1fr 1fr;flex:1;min-height:0;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface-warm);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px 0;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sidebar-section-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);padding:16px 16px 6px;}
.sidebar-section-label:first-child{padding-top:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .12s,color .12s;
  /* #5 — sin border-left dorado */
  border-left:2px solid transparent;
  font-size:13px;font-weight:500;color:var(--ink-mid);}
.nav-item:hover{background:rgba(0,0,0,0.04);color:var(--ink);}
.nav-item.active{background:rgba(0,0,0,0.05);border-left-color:var(--ink);color:var(--ink);}
.nav-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}

/* ── CONTENT PANEL ── */
.content{overflow-y:auto;height:100%;padding:28px 32px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.section-page{display:none;}
.section-page.active{display:block;}
.section-heading{font-family:var(--font-serif);font-size:22px;font-weight:500;color:var(--ink);margin-bottom:4px;letter-spacing:-.01em;}
.section-sub{font-size:13px;color:var(--ink-mute);margin-bottom:28px;line-height:1.5;}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.field label{font-size:12px;font-weight:500;color:var(--ink-mid);letter-spacing:.02em;}
.field input,.field textarea,.field select{font-family:var(--font);font-size:14px;color:var(--ink);background:var(--surface-warm);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.field input:hover,.field textarea:hover{border-color:var(--border-strong);}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,151,58,0.1);background:#fff;}
.field input::placeholder,.field textarea::placeholder{color:var(--ink-mute);opacity:.6;}
.field textarea{resize:vertical;min-height:80px;}
.field .hint{font-size:11px;color:var(--ink-mute);}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.divider{height:1px;background:var(--border);margin:24px 0;}

/* Palettes */
.palettes{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.palette-opt{border:2px solid var(--border);border-radius:var(--radius);padding:8px 6px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:4px;align-items:center;background:transparent;}
.palette-opt:hover{border-color:var(--border-strong);transform:translateY(-1px);}
.palette-opt.active{border-color:var(--gold);background:var(--gold-light);}
.palette-swatches{display:flex;gap:2px;}
.swatch{width:14px;height:14px;border-radius:3px;}
.palette-name{font-size:9px;color:var(--ink-mute);text-align:center;white-space:nowrap;}

/* Custom palette pickers */
.color-pickers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding:14px;background:var(--surface-section);border:1px solid var(--border);border-radius:var(--radius);}
.cp-row{display:flex;flex-direction:column;gap:4px;}
.cp-row label{font-size:11px;color:var(--ink-mute);font-weight:500;}
.cp-wrap{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:5px 9px;transition:border-color .15s;}
.cp-wrap:hover{border-color:var(--border-strong);}
.cp-wrap input[type="color"]{width:24px;height:24px;border:none;background:none;cursor:pointer;padding:0;border-radius:4px;}
.cp-hex{font-size:11px;color:var(--ink-mute);font-family:monospace;}

/* Image tabs — #3 unificado con Fondo */
.img-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface-section);border-radius:var(--radius);padding:4px;border:1px solid var(--border);}
.img-tab{flex:1;padding:7px 4px;border-radius:6px;border:none;background:transparent;color:var(--ink-mute);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.img-tab .tab-icon{font-size:14px;}
.img-tab .tab-label{font-size:9px;letter-spacing:.04em;}
.img-tab:hover{color:var(--ink);}
.img-tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.img-tab .tab-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:1px;opacity:0;transition:opacity .15s;}
.img-tab.has-image .tab-dot{opacity:1;}

.img-upload-zone{border:1.5px dashed var(--border);border-radius:var(--radius-lg);padding:22px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.img-upload-zone:hover{border-color:var(--gold);background:var(--gold-light);}
.img-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-upload-zone.has-image{border-style:solid;border-color:rgba(196,151,58,0.4);background:rgba(196,151,58,0.04);}
.img-zone-icon{font-size:28px;}
.img-zone-title{font-size:13px;font-weight:500;color:var(--ink);}
.img-zone-sub{font-size:11px;color:var(--ink-mute);}
.img-zone-tip{font-size:10.5px;color:var(--ink-mute);padding:5px 10px;background:rgba(196,151,58,0.08);border-radius:6px;border-left:2px solid rgba(196,151,58,0.35);line-height:1.4;width:100%;text-align:left;margin-top:2px;}
.img-thumb-strip{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.img-thumb{width:52px;height:52px;border-radius:8px;object-fit:contain;border:1.5px solid var(--border);background:var(--surface-section);display:none;}
.img-thumb.loaded{display:block;border-color:rgba(196,151,58,0.35);}
.img-thumb-label{font-size:9px;color:var(--ink-mute);text-align:center;margin-top:2px;}
.img-thumb-wrap{display:none;flex-direction:column;align-items:center;}
.img-thumb-wrap.loaded{display:flex;}

/* Logo toggle */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-section);border:1px solid var(--border);border-radius:var(--radius);margin-top:10px;}
.setting-row-label{font-size:13px;color:var(--ink-mid);}

/* #7 — toggles color topnav oscuro */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;border-radius:20px;background:var(--border-strong);transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--topnav);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:transform .2s;pointer-events:none;}
.toggle input:checked~.toggle-thumb{transform:translateX(16px);}

/* Inv fit controls */
.inv-fit-controls{display:none;flex-direction:column;gap:10px;margin-top:12px;padding:12px;background:var(--surface-section);border-radius:var(--radius);border:1px solid var(--border);}
.inv-fit-controls.visible{display:flex;}
.inv-fit-label{font-size:11px;color:var(--ink-mute);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.inv-fit-row{display:flex;gap:6px;}
.inv-fit-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--ink-mute);font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.inv-fit-btn:hover{border-color:var(--gold);color:var(--ink);}
.inv-fit-btn.active{border-color:var(--gold);background:var(--gold-light);color:var(--gold-dark);}
.inv-fit-btn .fit-icon{font-size:16px;}
.inv-size-row{display:flex;align-items:center;gap:8px;}
.inv-size-label{font-size:11px;color:var(--ink-mute);white-space:nowrap;}
.inv-size-slider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:linear-gradient(to right,var(--gold) var(--pct,40%),var(--border) var(--pct,40%));outline:none;cursor:pointer;}
.inv-size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.15);}

/* Background patterns — ahora dentro del panel Imágenes */
.bg-panel{display:none;flex-direction:column;gap:12px;}
.bg-panel.active{display:flex;}
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.bg-opt{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .1s;aspect-ratio:1;position:relative;}
.bg-opt:hover{transform:scale(1.04);}
.bg-opt.selected{border-color:var(--gold);}
.bg-opt-swatch{width:100%;height:100%;display:block;}
.bg-opt-label{position:absolute;bottom:0;left:0;right:0;font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,0.9);text-align:center;padding:3px 2px;background:rgba(0,0,0,0.35);}
.bg-upload-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;font-size:12px;color:var(--ink-mute);}
.bg-upload-zone:hover{border-color:var(--gold);background:var(--gold-light);}
.bg-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}

/* Frame controls */
.frame-controls{display:flex;flex-direction:column;gap:2px;}
.frame-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);background:var(--surface-section);border:1px solid var(--border);margin-bottom:6px;}
.frame-label{font-size:13px;color:var(--ink-mid);flex:1;}
.frame-color-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;transition:border-color .15s;}
.frame-color-btn:hover{border-color:var(--gold);}

/* Typography */
.typo-table{width:100%;border-collapse:collapse;}
.typo-table th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);padding:0 6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.typo-row{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer;}
.typo-row:hover{background:var(--surface-section);}
.typo-row td{padding:8px 6px;vertical-align:middle;}
.typo-role-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:20px;white-space:nowrap;background:var(--gold-light);color:var(--gold-dark);}
.typo-sample-cell{min-width:80px;max-width:110px;}
.typo-sample{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1;}
.typo-size-input{font-family:var(--font);font-size:12px;font-weight:600;background:var(--surface-section);border:1px solid var(--border);border-radius:6px;padding:5px 4px;color:var(--ink);outline:none;width:48px;text-align:center;transition:border-color .15s;}
.typo-size-input:focus{border-color:var(--gold);}
.typo-toggle-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--ink-mute);cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.typo-toggle-btn.active{background:var(--topnav);color:#fff;border-color:var(--topnav);}
.typo-caps-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--ink-mute);cursor:pointer;font-size:9px;font-weight:800;letter-spacing:.06em;transition:all .15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.typo-caps-btn.active{background:var(--gold-light);color:var(--gold-dark);border-color:rgba(196,151,58,0.4);}
.typo-color-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.typo-color-btn:hover{border-color:var(--gold);}
.typo-color-inner{width:14px;height:14px;border-radius:3px;border:1.5px solid rgba(0,0,0,0.1);pointer-events:none;flex-shrink:0;}

/* Font picker */
.font-picker-wrap{position:relative;width:100%;}
.font-picker-btn{width:100%;padding:5px 7px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:5px;transition:border-color .15s;text-align:left;}
.font-picker-btn:hover{border-color:var(--gold);}
.font-picker-btn.open{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,151,58,0.1);}
.font-picker-current{font-size:15px;flex:1;overflow:hidden;white-space:nowrap;color:var(--ink);line-height:1.2;}
.font-picker-caret{font-size:9px;color:var(--ink-mute);flex-shrink:0;transition:transform .15s;}
.font-picker-btn.open .font-picker-caret{transform:rotate(180deg);}
.font-picker-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius);z-index:500;overflow-y:auto;max-height:240px;box-shadow:0 8px 32px rgba(0,0,0,0.1);}
.font-picker-panel.open{display:block;}
.font-picker-panel::-webkit-scrollbar{width:3px;}
.font-picker-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.font-picker-option{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;flex-direction:column;gap:1px;}
.font-picker-option:last-child{border-bottom:none;}
.font-picker-option:hover{background:var(--gold-light);}
.font-picker-option.selected{background:rgba(196,151,58,0.08);}
.font-picker-opt-sample{font-size:18px;color:var(--ink);line-height:1.2;}
.font-picker-opt-name{font-size:9px;color:var(--ink-mute);letter-spacing:.04em;}

/* AI font */
.btn-ai-font{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:12px;padding:10px 16px;background:var(--gold-light);border:1px solid rgba(196,151,58,0.35);border-radius:var(--radius);color:var(--gold-dark);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.01em;}
.btn-ai-font:hover{background:rgba(196,151,58,0.2);border-color:var(--gold);}
.btn-ai-font.loading{opacity:.7;cursor:not-allowed;}
#ai-btn-icon{font-size:15px;}
.btn-ai-font.loading #ai-btn-icon{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.font-card{padding:12px 14px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface-section);cursor:pointer;transition:all .15s;margin-bottom:8px;}
.font-card:hover{border-color:var(--gold);background:var(--gold-light);}
.font-card.selected{border-color:var(--gold);background:rgba(196,151,58,0.08);}
.font-card-name{font-size:11px;font-weight:600;color:var(--ink-mute);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.font-card-sample{font-size:26px;line-height:1.1;color:var(--ink);margin-bottom:6px;}
.font-card-reason{font-size:11px;color:var(--ink-mute);line-height:1.4;}
.font-card-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.badge-top{background:var(--gold-light);color:var(--gold-dark);}
.badge-alt{background:var(--surface-section);color:var(--ink-mute);}

/* Modules — #6 sin fondo amarillo */
.module-list{display:flex;flex-direction:column;gap:8px;}
.module-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-section);transition:border-color .15s;}
.module-row.active{border-color:var(--border-strong);background:var(--surface-section);}
.module-icon{font-size:18px;width:30px;text-align:center;}
.module-info{flex:1;}
.module-name{font-size:13px;font-weight:500;color:var(--ink);}
.module-name-input{font-family:var(--font);font-size:12px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--ink);outline:none;width:100%;margin-top:4px;transition:border-color .15s;}
.module-name-input:focus{border-color:var(--gold);}

/* Color popup */
.color-popup{position:fixed;z-index:600;}
</style>
</head>
<body>
<script>
// Variables locales y de estado simuladas para el entorno
let currentEventId = "123";
let hasUnsavedChanges = false;

// ── SAVE EVENT PAYLOAD & TRANSLATIONS ──
async function saveEvent() {
  const btn = document.getElementById('save-btn');
  if(btn) { btn.textContent = 'Guardando...'; btn.disabled = true; }

  // Variables mapeadas según ev.*
  const ev = {
    name: document.getElementById('ev-name')?.value || '',
    title: document.getElementById('ev-title')?.value || '',
    subtitle: document.getElementById('ev-subtitle')?.value || '',
    venue: document.getElementById('ev-venue')?.value || '',
    venue_url: document.getElementById('ev-venue-url')?.value || '',
    start_date: document.getElementById('ev-start-date')?.value || '',
    start_time: document.getElementById('ev-start-time')?.value || ''
  };

  // Payload con nombres de columnas de base de datos actualizados
  const payload = {
    name: ev.name,
    title: ev.title,
    subtitle: ev.subtitle,
    venue: ev.venue,
    venue_url: ev.venue_url,
    start_date: ev.start_date,
    start_time: ev.start_time,
    // Otras propiedades de configuración visual
    palette_name: 'marino',
    frame_config: {
      maps_a: frameColors['maps-a'],
      maps_b: frameColors['maps-b'],
      maps_on: frameOn.maps,
    },
  };

  // Cambio quirúrgico: la tabla 'fotos' pasa a ser 'photos'
  const { error } = await sb.from('photos').update(payload).eq('id', currentEventId);

  if(btn) { btn.textContent = 'Guardar cambios'; btn.disabled = false; }

  if(error){
    console.error('Error guardando', error);
    alert('Error al guardar: ' + error.message);
    return;
  }

  hasUnsavedChanges = false;
  const msg = document.getElementById('saved-msg');
  if(msg) {
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
  }
}
