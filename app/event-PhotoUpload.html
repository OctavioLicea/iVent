<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos · Evento</title>
<link id="google-fonts" rel="stylesheet" href="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --color-primary:#3D6B20;
  --color-accent:#7A9E52;
  --color-surface:#F8FCF5;
  --color-ink:#1A2010;
  --color-ink-soft:#3D5016;
  --color-ink-mute:#6A8050;
  --color-surface2:#EEF4E8;
  --color-border:rgba(30,60,10,0.12);
  --color-border-strong:rgba(30,60,10,0.22);
  --color-primary-light: color-mix(in srgb, var(--color-primary) 10%, white);
  --font-display:"Great Vibes",cursive;
  --font-heading:"Cormorant Garamond",serif;
  --font-body:"DM Sans",sans-serif;
  --maps-a:#1B2C4E;
  --maps-b:#1A2010;
  --topnav:#1A1714;
  --radius:10px;--radius-lg:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  font-family:var(--font-body);
  background-color:var(--color-surface);
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:var(--color-ink);
  min-height:100vh;
}

/* ── TOP BAR — igual que event-designer ── */
.top-bar{
  height:56px;background:var(--topnav);
  border-bottom:1px solid rgba(196,151,58,0.15);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  position:sticky;top:0;z-index:20;
}
.home-btn{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:rgba(255,255,255,0.4);
  background:none;border:none;cursor:pointer;
  font-family:var(--font-body);padding:6px 10px;
  border-radius:8px;transition:color .15s,background .15s;
  text-decoration:none;flex-shrink:0;
}
.home-btn:hover{color:#F0EDE8;background:rgba(255,255,255,0.06)}
.home-btn svg{width:14px;height:14px;fill:currentColor}
.top-bar-title{
  flex:1;font-size:13px;
  color:rgba(255,255,255,0.45);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:var(--font-body);
}
.top-bar-space{width:80px;flex-shrink:0}

/* ── TÍTULO del evento ── */
.event-title{
  text-align:center;padding:28px 20px 4px;
  font-family:var(--font-display);
  font-size:var(--title-size, 44px);
  font-weight:var(--title-weight, 400);
  color:var(--title-color, var(--color-primary));
  line-height:1.1;
}
.event-subtitle{
  text-align:center;font-family:var(--font-heading);font-size:11px;
  color:var(--color-ink-mute);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:4px;
}

/* ── PAGE ── */
.page-wrap{display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 56px);padding:0 0 60px}
.inv-body{width:100%;max-width:480px;padding:20px 20px 0;display:flex;flex-direction:column;gap:18px}

/* ── COUNTER ── */
.inv-counter{
  text-align:center;padding:12px;
  background:#fff;
  border-radius:var(--radius);border:0.5px solid var(--color-border);
}
.inv-counter span{font-family:var(--font-heading);font-size:20px;color:var(--color-primary)}
.inv-counter small{font-size:12px;color:var(--color-ink-mute);display:block;margin-top:2px}

/* ── DROP ZONE ── */
.drop-zone{
  border:1.5px dashed var(--color-border);
  border-radius:var(--radius-lg);
  background:#fff;
  padding:40px 24px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--color-primary);background:var(--color-primary-light)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:36px;margin-bottom:12px}
.drop-label{font-family:var(--font-heading);font-size:20px;color:var(--color-primary);margin-bottom:6px}
.drop-sub{font-size:12px;color:var(--color-ink-mute)}

/* ── PREVIEW ── */
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.preview-item{position:relative;aspect-ratio:1;border-radius:var(--radius);overflow:hidden;background:#fff;border:0.5px solid var(--color-border)}
.preview-item img,.preview-item video{width:100%;height:100%;object-fit:cover}
.preview-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.preview-badge{position:absolute;bottom:4px;left:4px;font-size:10px;background:rgba(0,0,0,.45);color:#fff;padding:2px 6px;border-radius:20px}

/* ── NOMBRE ── */
.nombre-wrap{display:flex;flex-direction:column;gap:6px}
.nombre-label{font-size:12px;color:var(--color-ink-mute);letter-spacing:.04em;text-transform:uppercase}
.nombre-input{
  font-family:var(--font-body);font-size:14px;color:var(--color-ink);
  background:#fff;
  border:0.5px solid var(--color-border-strong);
  border-radius:var(--radius);padding:10px 14px;outline:none;transition:border-color .15s;
}
.nombre-input:focus{border-color:var(--color-primary)}
.nombre-input::placeholder{color:var(--color-ink-mute)}

/* ── BOTONES (mismo estilo: gradiente maps) ── */
.btn-action{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;
  color:#fff;
  font-family:var(--font-heading);font-size:18px;font-weight:600;letter-spacing:.03em;
  padding:14px 24px;border-radius:var(--radius-lg);border:none;cursor:pointer;
  box-shadow:0 3px 16px rgba(0,0,0,.18);
  transition:opacity .15s,transform .12s;
  background:linear-gradient(90deg, var(--maps-a), var(--maps-b));
}
.btn-action:hover{opacity:.9;transform:translateY(-1px)}
.btn-action:active{transform:scale(.98)}
.btn-action:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── PROGRESS ── */
.upload-progress{display:none;flex-direction:column;gap:8px}
.upload-progress.visible{display:flex}
.progress-track{height:6px;background:var(--color-surface2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--color-primary);border-radius:10px;transition:width .3s;width:0%}
.progress-label{font-size:12px;color:var(--color-ink-mute);text-align:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--color-ink);color:#fff;padding:12px 24px;border-radius:var(--radius-lg);font-size:13px;font-family:var(--font-body);transition:transform .3s;z-index:100;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--color-primary)}
.toast.err{background:#B33;}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:var(--color-surface);display:flex;align-items:center;justify-content:center;z-index:200;transition:opacity .3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{font-family:var(--font-heading);font-size:18px;color:var(--color-ink-mute)}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">Cargando evento…</div>
</div>

<div class="top-bar">
  <a class="home-btn" href="index.html" id="home-btn">← Inicio</a>
  <div class="top-bar-title" id="top-bar-title">Fotos</div>
  <div class="top-bar-space"></div>
</div>

<div class="page-wrap">
  <div class="event-title" id="event-title"></div>
  <div class="event-subtitle" id="event-subtitle"></div>

  <div class="inv-body">
    <div style="text-align:center;padding-top:4px">
      <div style="font-family:var(--font-heading);font-size:16px;color:var(--color-ink-soft)" id="page-tagline">Comparte tus fotos 📷</div>
    </div>

    <div class="inv-counter">
      <span id="total-fotos">—</span>
      <small>fotos compartidas hasta ahora</small>
      <div style="font-size:10px;color:var(--color-ink-mute);margin-top:4px;opacity:0.7" id="storage-size"></div>
    </div>

    <div class="nombre-wrap">
      <label class="nombre-label" for="nombre-input">Tu nombre (opcional)</label>
      <input class="nombre-input" id="nombre-input" type="text" placeholder="¿Quién eres?" maxlength="40">
    </div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*,video/*" multiple>
      <div class="drop-icon">📸</div>
      <div class="drop-label">Selecciona o arrastra tus fotos</div>
      <div class="drop-sub">Fotos y videos · Máximo 10 archivos a la vez</div>
    </div>

    <!-- Botón tomar foto — mismo estilo que compartir -->
    <label style="display:block">
      <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
      <div class="btn-action" style="cursor:pointer" onclick="document.getElementById('camera-input').click()">
        📷 &nbsp; Tomar foto
      </div>
    </label>

    <div class="preview-grid" id="preview-grid"></div>

    <div class="upload-progress" id="upload-progress">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Subiendo...</div>
    </div>

    <button class="btn-action" id="btn-upload" disabled>Compartir 💌</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = "https://qoaxifnrlxxwwdzqxmot.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvYXhpZm5ybHh4d3dkenF4bW90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDY5MTUsImV4cCI6MjA5NDI4MjkxNX0.kW9xOfMslcra92rcxe9Jz4vspsmen4jNuxdVc_29z9Q";
const BUCKET = "event-assets";
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

const params = new URLSearchParams(location.search);
const EVENT_ID = params.get('event_id');

// ── Aplicar config al :root ──────────────────────────────────────
function applyConfig(config) {
  if (!config) return;
  const r = document.documentElement.style;
  if (config.palette) {
    if (config.palette.primary) r.setProperty('--color-primary', config.palette.primary);
    if (config.palette.accent)  r.setProperty('--color-accent',  config.palette.accent);
    if (config.palette.surface) r.setProperty('--color-surface', config.palette.surface);
    if (config.palette.ink)     r.setProperty('--color-ink',     config.palette.ink);
  }
  if (config.frames) {
    if (config.frames.maps_a?.color) r.setProperty('--maps-a', config.frames.maps_a.color);
    if (config.frames.maps_b?.color) r.setProperty('--maps-b', config.frames.maps_b.color);
  }
  if (config.typography) {
    const fonts = new Set();
    Object.values(config.typography).forEach(t => { if (t.font) fonts.add(t.font); });
    const families = [...fonts].map(f => `family=${f.replace(/ /g, '+')}`).join('&');
    document.getElementById('google-fonts').href =
      `https://fonts.googleapis.com/css2?${families}&display=swap`;
    const t = config.typography;
    if (t.title?.font)   r.setProperty('--font-display', `"${t.title.font}", cursive`);
    if (t.display?.font) r.setProperty('--font-heading', `"${t.display.font}", serif`);
    if (t.caption?.font) r.setProperty('--font-body',    `"${t.caption.font}", sans-serif`);
    // Título: tamaño, bold y color desde config
    if (t.title?.size)  r.setProperty('--title-size',   t.title.size + 'px');
    if (t.title?.bold !== undefined) r.setProperty('--title-weight', t.title.bold ? '700' : '400');
    if (t.title?.color) r.setProperty('--title-color',  t.title.color);
  }
}

// ── Cargar evento ─────────────────────────────────────────────────
async function loadEvent() {
  if (!EVENT_ID) {
    document.getElementById('loading-overlay').classList.add('hidden');
    return;
  }
  const { data, error } = await sb
    .from('events')
    .select('id, nombre, titulo, config, bg_url')
    .eq('id', EVENT_ID)
    .single();

  if (error || !data) {
    document.getElementById('loading-overlay').classList.add('hidden');
    showToast('No se pudo cargar el evento', 'err');
    return;
  }

  // Aplicar look & feel
  applyConfig(data.config);

  // Imagen de fondo desde bg_url
  if (data.bg_url) {
    document.body.style.backgroundImage = `url('${data.bg_url}')`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundAttachment = 'fixed';
  }

  // Textos
  const nombre = data.titulo || data.nombre || 'Evento';
  document.title = `Fotos · ${nombre}`;
  document.getElementById('top-bar-title').textContent = `${nombre} · Fotos`;
  document.getElementById('event-title').textContent = nombre;

  document.getElementById('loading-overlay').classList.add('hidden');
  loadTotalFotos();
}

// ── Compresión ────────────────────────────────────────────────────
function comprimirImagen(file, maxPx = 1920, calidad = 0.82) {
  return new Promise(resolve => {
    if (!file.type.startsWith("image/")) { resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if (!blob || blob.size >= file.size) { resolve(file); return; }
        resolve(new File([blob], file.name.replace(/\.[^.]+$/, ".jpg"), { type: "image/jpeg" }));
      }, "image/jpeg", calidad);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

// ── Archivos ──────────────────────────────────────────────────────
const dropZone   = document.getElementById("drop-zone");
const fileInput  = document.getElementById("file-input");
const previewGrid = document.getElementById("preview-grid");
const btnUpload  = document.getElementById("btn-upload");
let archivos = [];
const MAX_VIDEO_MB = 30;

dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener("change", () => addFiles([...fileInput.files]));
document.getElementById("camera-input").addEventListener("change", e => addFiles([...e.target.files]));

function addFiles(nuevos) {
  const rechazados = [];
  const ok = nuevos.filter(f => {
    if (f.type.startsWith("video/") && f.size > MAX_VIDEO_MB * 1024 * 1024) { rechazados.push(f.name); return false; }
    return f.type.startsWith("image/") || f.type.startsWith("video/");
  });
  if (rechazados.length > 0) showToast(`Video muy pesado (máx ${MAX_VIDEO_MB} MB)`, "err");
  archivos = [...archivos, ...ok].slice(0, 10);
  renderPreviews();
  btnUpload.disabled = archivos.length === 0;
}

function renderPreviews() {
  previewGrid.innerHTML = "";
  archivos.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const el = document.createElement("div");
    el.className = "preview-item";
    const esVideo = f.type.startsWith("video/");
    el.innerHTML = `${esVideo ? `<video src="${url}" muted playsinline></video>` : `<img src="${url}" alt="">`}
      <button class="preview-remove" data-i="${i}">✕</button>
      <span class="preview-badge">${esVideo ? "🎬" : "📷"}</span>`;
    previewGrid.appendChild(el);
  });
  previewGrid.querySelectorAll(".preview-remove").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      archivos.splice(+btn.dataset.i, 1);
      renderPreviews();
      btnUpload.disabled = archivos.length === 0;
    });
  });
}

// ── Upload ────────────────────────────────────────────────────────
btnUpload.addEventListener("click", async () => {
  if (archivos.length === 0) return;
  const nombre  = document.getElementById("nombre-input").value.trim() || "Invitado";
  const progress = document.getElementById("upload-progress");
  const fill     = document.getElementById("progress-fill");
  const lbl      = document.getElementById("progress-label");
  progress.classList.add("visible");
  btnUpload.disabled = true;
  let ok = 0;

  for (let i = 0; i < archivos.length; i++) {
    const raw = archivos[i];
    lbl.textContent = `Preparando ${i + 1} de ${archivos.length}...`;
    const f = await comprimirImagen(raw);
    const ext = f.type === "image/jpeg" ? "jpg" : raw.name.split(".").pop();
    const filename = `${Date.now()}_${Math.random().toString(36).slice(2, 7)}.${ext}`;
    const path = EVENT_ID ? `${EVENT_ID}/fotos/${filename}` : `legacy/${filename}`;

    lbl.textContent = `Subiendo ${i + 1} de ${archivos.length}...`;
    fill.style.width = `${Math.round((i / archivos.length) * 100)}%`;

    const { error: upErr } = await sb.storage.from(BUCKET).upload(path, f, { upsert: false });
    if (upErr) { console.error(upErr); continue; }

    const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
    await sb.from('fotos').insert({
      path, url: urlData.publicUrl, nombre,
      tipo: f.type.startsWith("video/") ? "video" : "foto",
      size: f.size, event_id: EVENT_ID || null,
      created_at: new Date().toISOString()
    });
    ok++;
  }

  fill.style.width = "100%";
  lbl.textContent = `Listo — ${ok} archivo${ok !== 1 ? "s" : ""} compartido${ok !== 1 ? "s" : ""} 🎉`;
  setTimeout(() => {
    progress.classList.remove("visible"); fill.style.width = "0%";
    archivos = []; renderPreviews(); btnUpload.disabled = true; fileInput.value = "";
    loadTotalFotos();
  }, 2000);
  showToast(ok > 0 ? "Gracias por compartir! 💌" : "Algunos archivos fallaron", ok > 0 ? "ok" : "err");
});

// ── Counter ───────────────────────────────────────────────────────
async function loadTotalFotos() {
  let q = sb.from('fotos').select('*', { count: 'exact', head: true });
  if (EVENT_ID) q = q.eq('event_id', EVENT_ID);
  const { count } = await q;
  document.getElementById("total-fotos").textContent = count ?? 0;
  try {
    let sq = sb.from('fotos').select('size');
    if (EVENT_ID) sq = sq.eq('event_id', EVENT_ID);
    const { data: sizes } = await sq;
    if (sizes) {
      const mb = (sizes.reduce((s, r) => s + (r.size || 0), 0) / (1024 * 1024)).toFixed(1);
      document.getElementById("storage-size").textContent = `${mb} MB usados`;
    }
  } catch (e) {}
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type}`;
  void t.offsetWidth; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

loadEvent();
</script>
</body>
</html>
