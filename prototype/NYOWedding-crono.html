<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma · Nydia & Octavio</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose:#7D2935; --rose-light:#F3E8EA; --rose-dark:#561820; --rose-mid:#A34455;
  --sage:#6B8F71; --sage-light:#EBF0E8; --sage-dark:#3D5C42;
  --gold:#9C6B2E; --gold-light:#F7F0E3; --gold-mid:#C4973A;
  --kraft:#EDE0CB; --ink:#2A1F1A; --ink-soft:#5C4A3A; --ink-mute:#9C8878;
  --surface:#FAF7F2; --surface2:#F2EBE0;
  --border:rgba(90,50,30,0.10); --border-strong:rgba(90,50,30,0.20);
  --radius:10px; --radius-lg:16px;
  --font-display:"Great Vibes",cursive;
  --font-heading:"Cormorant Garamond",serif;
  --font-body:"DM Sans",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--font-body);background:var(--surface);color:var(--ink);min-height:100vh}

/* top bar */
.top-bar{width:100%;display:flex;align-items:center;padding:14px 20px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;gap:12px}
.home-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:0.5px solid var(--border-strong);border-radius:30px;padding:7px 14px;font-family:var(--font-heading);font-size:15px;color:var(--ink-soft);text-decoration:none;transition:background .15s,color .15s;flex-shrink:0}
.home-btn:hover{background:var(--rose-light);color:var(--rose-dark)}
.home-btn svg{width:14px;height:14px;fill:currentColor}
.top-bar-title{flex:1;font-family:var(--font-heading);font-size:17px;color:var(--ink-mute);text-align:center}
.top-bar-space{width:90px;flex-shrink:0}

/* page */
.page-wrap{max-width:760px;margin:0 auto;padding:28px 20px 60px}
.page-title{font-family:var(--font-heading);font-size:28px;font-weight:500;color:var(--rose-dark);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink-mute);margin-bottom:24px}

/* stats bar */
.tl-stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.tl-stat-card{flex:1;min-width:110px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.tl-stat-num{font-family:var(--font-heading);font-size:26px;font-weight:600;color:var(--ink);line-height:1}
.tl-stat-lbl{font-size:11px;color:var(--ink-mute);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* sections */
.tl-section-block{margin-bottom:28px}
.tl-section-header{display:flex;align-items:center;gap:8px;padding:6px 0 6px 12px;margin-bottom:8px}
.tl-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-section-title{font-size:10px;font-weight:600;letter-spacing:.1em}
.tl-section-count{font-size:10px;margin-left:auto;opacity:.7}
.tl-section-rows{display:flex;flex-direction:column;gap:10px}

/* etapa row */
.tl-etapa-row{display:grid;grid-template-columns:80px 1fr;gap:0 10px;align-items:start;border-radius:var(--radius);padding:4px}
.tl-etapa-left{display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:10px}
.tl-etapa-times{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%}
.tl-etapa-arrow{font-size:11px;color:var(--ink-mute)}
.tl-time-badge{font-family:var(--font-heading);font-size:13px;font-weight:500;color:var(--rose);background:var(--rose-light);border:0.5px solid rgba(125,41,53,.15);border-radius:6px;padding:3px 8px;text-align:center;min-width:60px}
.tl-time-badge.fin{color:var(--ink-mute);background:var(--surface2);border-color:var(--border)}

/* card */
.tl-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.tl-card.anchor{border-left:3px solid var(--rose)}
.tl-card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-card-title{font-family:var(--font-heading);font-size:16px;font-weight:500;color:var(--ink)}
.tl-dur-badge{font-size:11px;color:var(--ink-mute);background:var(--surface2);border:0.5px solid var(--border);border-radius:6px;padding:2px 8px;white-space:nowrap;margin-left:auto}
.tl-anchor-badge{font-size:9px;color:var(--rose-dark);background:var(--rose-light);border:0.5px solid var(--rose-mid);border-radius:20px;padding:2px 7px}
.tl-card-meta{display:flex;align-items:flex-start;gap:6px;margin-top:7px;font-size:12px;color:var(--ink-mute)}
.tl-music-row{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);font-size:12px;color:var(--ink-soft)}

/* momentos */
.tl-momentos-wrap{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.tl-momentos-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
.tl-momento-row{display:grid;grid-template-columns:40px 10px 1fr;gap:0 8px;align-items:start;margin-bottom:6px}
.tl-momento-time{font-size:11px;color:var(--rose);font-family:var(--font-heading);font-weight:500;padding-top:8px;text-align:right}
.tl-momento-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);border:1.5px solid var(--surface);margin-top:10px;flex-shrink:0}
.tl-momento-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 10px}
.tl-momento-name{font-size:13px;color:var(--ink);font-weight:500}
.tl-momento-dur{font-size:11px;color:var(--ink-mute);margin-top:2px}
.tl-momento-music{font-size:11px;color:var(--ink-mute);margin-top:4px;font-style:italic}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.loading-title{font-family:var(--font-display);font-size:36px;color:var(--rose-dark)}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--rose);animation:dot-pulse 1.2s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* layout modal */
.tl-layout-modal-bg{position:fixed;inset:0;background:rgba(42,31,26,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.tl-layout-modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:0 8px 40px rgba(42,31,26,.22);width:100%;max-width:960px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.tl-layout-modal-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.tl-layout-modal-title{font-family:var(--font-heading);font-size:18px;font-weight:500;color:var(--rose-dark);flex:1}
.tl-layout-modal-close{background:none;border:none;font-size:20px;color:var(--ink-mute);cursor:pointer;padding:4px 8px;border-radius:6px}
.tl-layout-modal-close:hover{background:var(--rose-light);color:var(--rose-dark)}
.tl-layout-selector-wrap{padding:12px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.tl-layout-selector-hint{font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.tl-layout-selector{display:flex;flex-wrap:wrap;gap:5px}
.tl-sel-btn{font-size:10px;font-family:var(--font-body);padding:3px 9px;border-radius:20px;border:0.5px solid var(--gold-mid);background:transparent;color:var(--rose-dark);cursor:pointer;user-select:none;transition:all .12s}
.tl-sel-btn.active{background:var(--rose-dark);color:var(--kraft);border-color:var(--rose-dark)}
.tl-layout-canvas-wrap{flex:1;overflow:auto;padding:16px 20px;background:var(--surface2)}
.tl-layout-print-bar{padding:12px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:center;flex-shrink:0}
.tl-print-btn{padding:10px 28px;background:var(--rose-dark);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;cursor:pointer;transition:background .15s}
.tl-print-btn:hover{background:var(--rose)}
.tl-add-btn{display:flex;align-items:center;gap:6px;background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:10px 18px;color:var(--ink-mute);font-family:var(--font-body);font-size:13px;cursor:pointer;margin:4px 0 8px;transition:all .15s;width:100%}
.tl-add-btn:hover{background:var(--sage-light);color:var(--sage-dark);border-color:var(--sage)}

@media print{.top-bar,.tl-layout-print-bar{display:none}}

/* Modo layout para invitados */
body.modo-layout .page-wrap { display: none; }
body.modo-layout #tl-layout-fullscreen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--surface2);
}
#tl-layout-fullscreen { display: none; }
@media(max-width:520px){.tl-etapa-row{grid-template-columns:68px 1fr}}
</style>
</head>
<body>

<div class="top-bar">
  <a class="home-btn" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Inicio
  </a>
  <div class="top-bar-title">Cronograma · 29 Mayo 2026</div>
  <div class="top-bar-space"></div>
</div>

<div class="page-wrap">
  <div class="page-title">Cronograma del día</div>
  <div class="page-sub">Viernes 29 de Mayo · Quinta Arreboleda · Arteaga, Coahuila</div>

  <div class="tl-stats-bar" id="tl-stats-bar">
    <div class="loading">
      <div class="loading-title">Cargando…</div>
      <div class="loading-dots">
        <div class="loading-dot" style="animation-delay:0s"></div>
        <div class="loading-dot" style="animation-delay:.2s"></div>
        <div class="loading-dot" style="animation-delay:.4s"></div>

  </div>
</div>

<!-- MODO LAYOUT INVITADO (fullscreen, sin modal) -->
<div id="tl-layout-fullscreen">
  <div class="top-bar">
    <a class="home-btn" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Inicio
    </a>
    <div class="top-bar-title">Cronograma · 29 Mayo 2026</div>
    <div class="top-bar-space"></div>
  </div>
  <div style="flex:1;overflow:auto;padding:16px 20px 40px;background:var(--surface2)">
    <div id="landscape-hint" style="display:none;text-align:center;padding:10px 16px;font-family:var(--font-body);font-size:13px;color:var(--ink-mute);background:var(--gold-light);border-radius:var(--radius);margin-bottom:12px;max-width:1200px;margin-left:auto;margin-right:auto">
      📱 Gira tu celular para ver el cronograma completo
    </div>
    <svg id="tl-layout-canvas-full" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto;max-width:1200px;margin:0 auto"></svg>
  </div>
</div>

<!-- LAYOUT MODAL -->
<div id="tl-layout-modal" class="tl-layout-modal-bg" style="display:none" onclick="if(event.target===this)cerrarLayoutTimeline()">
  <div class="tl-layout-modal">
    <div class="tl-layout-modal-hdr">
      <span class="tl-layout-modal-title">🌿 Layout imprimible · Cronograma</span>
      <button class="tl-layout-modal-close" onclick="cerrarLayoutTimeline()">✕</button>
    </div>
    <div class="tl-layout-selector-wrap">
      <div class="tl-layout-selector-hint">Selecciona las etapas a mostrar</div>
      <div class="tl-layout-selector" id="tl-layout-selector"></div>
    </div>
    <div class="tl-layout-canvas-wrap">
      <svg id="tl-layout-canvas" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:560px"></svg>
    </div>
    <div class="tl-layout-print-bar">
      <button class="tl-print-btn" onclick="window.print()">🖨 Imprimir cronograma</button>
    </div>
  </div>
</div>

<div style="position:fixed;bottom:6px;right:10px;font-size:10px;color:#9C8878;opacity:.5;pointer-events:none;z-index:999;font-family:'DM Sans',sans-serif;">v 2026-05-27</div>

<script>
const SB_URL = "https://qoaxifnrlxxwwdzqxmot.supabase.co";
const SB_KEY = "sb_publishable_P72GEsWtoUAfqiAev-oFig_SOs1cdwv";
const sbH = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};

const esModoLayout = new URLSearchParams(location.search).get("modo") === "layout";
if (esModoLayout) document.body.classList.add("modo-layout");

async function sbGet(table, params="") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {headers:sbH});
  return r.ok ? r.json() : [];
}

const TL_SECTIONS = ["Preparativos","Ceremonia","Recepción","Fiesta"];
const TL_SECTION_COLORS = {
  "Preparativos":{dot:"var(--sage)",txt:"var(--sage-dark)"},
  "Ceremonia":   {dot:"var(--rose)",txt:"var(--rose-dark)"},
  "Recepción":   {dot:"var(--gold-mid)",txt:"var(--gold)"},
  "Fiesta":      {dot:"var(--ink-soft)",txt:"var(--ink-soft)"},
};

let etapas=[], momentos=[];

async function loadAll() {
  [etapas, momentos] = await Promise.all([
    sbGet("tl_etapas","order=orden.asc,created_at.asc"),
    sbGet("tl_momentos","order=etapa_id.asc,orden.asc,created_at.asc"),
  ]);
  if (esModoLayout) {
    document.getElementById("tl-layout-fullscreen").style.display = "flex";
    tlLayoutActive = new Set(etapas.map(e => e.id));
    _renderLayoutSVGInto(document.getElementById("tl-layout-canvas-full"));

    // Intentar bloquear orientación landscape
    try {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
      }
    } catch(e) {}

    // Hint si está en portrait
    function checkOrientation() {
      const hint = document.getElementById("landscape-hint");
      if (hint) hint.style.display = window.innerWidth < window.innerHeight ? "block" : "none";
    }
    checkOrientation();
    window.addEventListener("resize", checkOrientation);
  } else {
    renderTimelineStats();
    renderTimeline();
  }
}

function toMin(t){if(!t)return 0;const p=t.split(":").map(Number);return p[0]*60+(p[1]||0)}
function durToMin(d){if(!d)return 0;let t=0;const hm=d.match(/(\d+)h/);if(hm)t+=parseInt(hm[1])*60;const mm=d.match(/(\d+)min/);if(mm)t+=parseInt(mm[1]);return t}
function minToHHMM(m){m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")}
function tlTotalMinutes(){if(!etapas.length)return 0;const f=toMin(etapas[0].time_ini),l=etapas[etapas.length-1];let d=toMin(l.time_ini)+durToMin(l.dur)-f;if(d<0)d+=1440;return d}
function tlEndTime(){if(!etapas.length)return "--:--";const l=etapas[etapas.length-1];return minToHHMM(toMin(l.time_ini)+durToMin(l.dur))}

function renderTimelineStats(){
  const bar=document.getElementById("tl-stats-bar");
  if(!bar)return;
  const m=tlTotalMinutes(),hh=Math.floor(m/60),mm=m%60;
  bar.innerHTML=`
    <div class="tl-stat-card"><div class="tl-stat-num">${hh}h${mm>0?" "+mm+"m":""}</div><div class="tl-stat-lbl">Duración total</div></div>
    <div class="tl-stat-card"><div class="tl-stat-num">${etapas.length}</div><div class="tl-stat-lbl">Etapas del evento</div></div>
    <div class="tl-stat-card"><div class="tl-stat-num">${tlEndTime()}</div><div class="tl-stat-lbl">Hora estimada de cierre</div></div>`;
}

function renderTimeline(){
  const wrap=document.getElementById("timeline-wrap");
  if(!wrap)return;
  const grouped={};
  TL_SECTIONS.forEach(s=>grouped[s]=[]);
  etapas.forEach(et=>{const s=et.seccion||"Preparativos";if(!grouped[s])grouped[s]=[];grouped[s].push(et);});

  wrap.innerHTML=TL_SECTIONS.map(seccion=>{
    const grupo=grouped[seccion];
    if(!grupo.length)return "";
    const col=TL_SECTION_COLORS[seccion]||TL_SECTION_COLORS["Fiesta"];

    const etapasHtml=grupo.map(et=>{
      const hijos=momentos.filter(m=>m.etapa_id===et.id).sort((a,b)=>a.orden-b.orden);
      const isAnchor=et.nombre&&(et.nombre.includes("Bendición")||et.nombre.includes("civil"));
      const soloHijo=hijos.length===1&&hijos[0].nombre===et.nombre;

      const momentosHtml=soloHijo?"":hijos.map(mo=>`
        <div class="tl-momento-row">
          <div class="tl-momento-time">${mo.time_ini||""}</div>
          <div class="tl-momento-dot"></div>
          <div class="tl-momento-card">
            <div class="tl-momento-name">${mo.nombre||""}</div>
            ${mo.dur?`<div class="tl-momento-dur">⏱ ${mo.dur}</div>`:""}
            ${mo.musica?`<div class="tl-momento-music">🎵 ${mo.musica}</div>`:""}
          </div>
        </div>`).join("");

      return `<div class="tl-etapa-row">
        <div class="tl-etapa-left">
          <div class="tl-etapa-times">
            <div class="tl-time-badge">${et.time_ini||""}</div>
            <div class="tl-etapa-arrow">↓</div>
            <div class="tl-time-badge fin">${et.time_fin||""}</div>
          </div>
        </div>
        <div class="tl-card ${isAnchor?"anchor":""}">
          <div class="tl-card-header">
            <span class="tl-card-title">${et.nombre||""}</span>
            ${isAnchor?"<span class=\"tl-anchor-badge\">📌 fija</span>":""}
            <span class="tl-dur-badge">${et.dur||""}</span>
          </div>
          ${et.notas?`<div class="tl-card-meta">👤 ${et.notas}</div>`:""}
          ${et.musica?`<div class="tl-music-row">🎵 ${et.musica}</div>`:""}
          ${!soloHijo&&hijos.length>0?`<div class="tl-momentos-wrap"><div class="tl-momentos-label">Momentos</div>${momentosHtml}</div>`:""}
        </div>
      </div>`;
    }).join("");

    return `<div class="tl-section-block">
      <div class="tl-section-header" style="border-left:3px solid ${col.dot}">
        <span class="tl-section-dot" style="background:${col.dot}"></span>
        <span class="tl-section-title" style="color:${col.dot}">${seccion.toUpperCase()}</span>
        <span class="tl-section-count" style="color:${col.dot}">${grupo.length} etapa${grupo.length!==1?"s":""}</span>
      </div>
      <div class="tl-section-rows">${etapasHtml}</div>
    </div>`;
  }).join("");
}

/* Layout imprimible — mismo código que en planner */
const ICON_MAP={"arreglo":"✂","sesión":"📷","fotos":"📷","traslado":"🚗","llegada":"👥","cóctel":"🥂","coctel":"🥂","bendición":"⛪","bendicion":"⛪","acomodo":"🪑","ceremonia":"💍","entrada":"👑","baile":"🎶","palabras":"🎤","cena":"🍽","set":"🎧","regional":"🎺","cierre":"🎺"};
const TL_SIZES={lg:["bendición","bendicion","civil","ceremonia"],md:["llegada","cóctel","coctel","entrada","baile","regional","cena"]};
function etapaIcon(n){const nl=(n||"").toLowerCase();for(const k of Object.keys(ICON_MAP)){if(nl.includes(k))return ICON_MAP[k]}return "🎀"}
function etapaSize(n){const nl=(n||"").toLowerCase();if(TL_SIZES.lg.some(k=>nl.includes(k)))return"lg";if(TL_SIZES.md.some(k=>nl.includes(k)))return"md";return"sm"}
function toAMPM(t){if(!t)return"";const [hh,mm]=t.split(":").map(Number);const ampm=hh>=12?"pm":"am";const h=hh%12||12;return`${h}:${String(mm).padStart(2,"0")} ${ampm}`}
let tlLayoutActive=new Set();
function abrirLayoutTimeline(){tlLayoutActive=new Set(etapas.map(e=>e.id));_renderLayoutModal();document.getElementById("tl-layout-modal").style.display="flex"}
function cerrarLayoutTimeline(){document.getElementById("tl-layout-modal").style.display="none"}
function _renderLayoutModal(){_renderLayoutSelector();_renderLayoutSVGInto(document.getElementById("tl-layout-canvas"))}
function _renderLayoutSelector(){const wrap=document.getElementById("tl-layout-selector");if(!wrap)return;wrap.innerHTML=etapas.map(et=>`<div class="tl-sel-btn ${tlLayoutActive.has(et.id)?"active":""}" onclick="tlToggleEtapa(${et.id})">${et.time_ini||""} ${(et.nombre||"").split(" ")[0]}</div>`).join("")}
function tlToggleEtapa(id){if(tlLayoutActive.has(id)){if(tlLayoutActive.size>3)tlLayoutActive.delete(id)}else tlLayoutActive.add(id);_renderLayoutModal()}
function _renderLayoutSVGInto(canvas){
  if(!canvas)return;
  const vis=etapas.filter(e=>tlLayoutActive.has(e.id));const N=vis.length;
  const W=840,H=594,KRAFT="#EDE0CB",VINE="#561820",GREEN="#3D5C42",GOLD="#9C6B2E",MUTE="#7A5C3A";
  const SIZES2={sm:{tick:8,arm:44,nameSize:8.5,musicSize:7,iconSize:13,iconDY:5,lw:1.2},md:{tick:13,arm:60,nameSize:10,musicSize:8,iconSize:17,iconDY:6,lw:1.8},lg:{tick:20,arm:82,nameSize:13,musicSize:9,iconSize:22,iconDY:8,lw:2.5}};
  const PAD=28,ITEM_W=Math.max(44,Math.min(72,Math.floor((W-PAD*2-20)/Math.max(N,1)))),MID_Y=H/2+10;
  function leaf(cx,cy,angle,len,col){const r=angle*Math.PI/180,ex=cx+Math.cos(r)*len,ey=cy+Math.sin(r)*len,mx=cx+Math.cos(r)*len*.5-Math.sin(r)*len*.18,my=cy+Math.sin(r)*len*.5+Math.cos(r)*len*.18;return`<path d="M${cx},${cy} Q${mx},${my} ${ex},${ey} Q${mx+Math.sin(r)*len*.14},${my-Math.cos(r)*len*.14} ${cx},${cy}" fill="${col}" opacity=".75"/>`}
  function stemL(x1,y1,x2,y2,col,w){return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`}
  function botanic(){let s="";s+=stemL(0,24,56,8,GREEN,1.1)+stemL(0,24,50,46,GREEN,.9);[[14,-50],[24,-40],[36,-35],[46,-22]].forEach(([x,a])=>{s+=leaf(x,24+x*.28,a,12,GREEN)});[[12,50],[24,60],[36,65],[48,75]].forEach(([x,a])=>{s+=leaf(x,24+x*.38,a,10,GREEN)});s+=stemL(8,0,8,34,GREEN,.7);[8,18,28].forEach(y=>{s+=leaf(8,y,-30,9,GREEN)+leaf(8,y,210,8,GREEN)});s+=stemL(W,18,W-56,4,GREEN,1.1)+stemL(W,18,W-50,42,GREEN,.9);[[W-14,-130],[W-24,-140],[W-36,-145],[W-46,-158]].forEach(([x,a])=>{s+=leaf(x,18+(W-x)*.22,a,12,GREEN)});[[W-12,130],[W-24,120],[W-36,115],[W-48,105]].forEach(([x,a])=>{s+=leaf(x,18+(W-x)*.32,a,10,GREEN)});s+=stemL(0,H-24,46,H-7,GREEN,.9);[[10,130],[22,138],[36,146]].forEach(([x,a])=>{s+=leaf(x,H-24+x*.1,a,10,GREEN)});s+=stemL(W,H-24,W-46,H-7,GREEN,.9);[[W-10,-50+180],[W-22,-42+180],[W-36,-34+180]].forEach(([x,a])=>{s+=leaf(x,H-24+(W-x)*.1,a,10,GREEN)});[[18,14],[30,9],[W-18,11],[W-30,6]].forEach(([x,y])=>{s+=`<circle cx="${x}" cy="${y}" r="2" fill="${VINE}" opacity=".6"/>`});return s}
  function wrapT(text,maxW,size){const maxC=Math.floor(maxW/(size*.58)),words=(text||"").replace(/\n/g," ").split(" ");const lines=[];let cur="";words.forEach(w=>{if((cur+" "+w).trim().length>maxC&&cur){lines.push(cur.trim());cur=w}else cur=(cur+" "+w).trim()});if(cur)lines.push(cur.trim());return lines}
  let out=`<rect x="0" y="0" width="${W}" height="${H}" fill="${KRAFT}"/>`;
  for(let y=0;y<H;y+=3.5)out+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#C4A882" stroke-width=".3" opacity=".14"/>`;
  out+=botanic();
  out+=`<text x="${W/2}" y="32" text-anchor="middle" font-size="26" font-family="Georgia,serif" font-style="italic" fill="${VINE}">The Wedding Day</text>`;
  out+=`<text x="${W/2}" y="46" text-anchor="middle" font-size="8" font-family="sans-serif" letter-spacing="2.5" fill="${MUTE}">29 DE MAYO DE 2026  ·  QUINTA ARREBOLEDA  ·  ARTEAGA, COAH.</text>`;
  out+=`<line x1="${PAD}" y1="${MID_Y}" x2="${W-PAD}" y2="${MID_Y}" stroke="${VINE}" stroke-width="1.2"/>`;
  out+=`<circle cx="${PAD}" cy="${MID_Y}" r="3" fill="${VINE}"/><circle cx="${W-PAD}" cy="${MID_Y}" r="3" fill="${VINE}"/>`;
  out+=`<circle cx="${PAD}" cy="${MID_Y}" r="5.5" fill="none" stroke="${VINE}" stroke-width=".6"/>`;
  out+=`<circle cx="${W-PAD}" cy="${MID_Y}" r="5.5" fill="none" stroke="${VINE}" stroke-width=".6"/>`;
  vis.forEach((et,i)=>{
    const up=i%2===0,sz=etapaSize(et.nombre),cfg=SIZES2[sz];
    const cx=PAD+10+i*ITEM_W+ITEM_W/2,sign=up?-1:1;
    const isAnc=et.nombre&&(et.nombre.toLowerCase().includes("bendic")||et.nombre.toLowerCase().includes("civil"));
    const col=isAnc?VINE:sz==="lg"?GOLD:GREEN;
    out+=`<line x1="${cx}" y1="${MID_Y-cfg.tick}" x2="${cx}" y2="${MID_Y+cfg.tick}" stroke="${col}" stroke-width="${cfg.lw}" stroke-linecap="round"/>`;
    if(isAnc)out+=`<rect x="${cx-4}" y="${MID_Y-4}" width="8" height="8" rx="1.5" transform="rotate(45,${cx},${MID_Y})" fill="${VINE}"/>`;
    const armS=MID_Y+sign*(cfg.tick+3),armE=MID_Y+sign*(cfg.tick+cfg.arm-8);
    out+=`<line x1="${cx}" y1="${armS}" x2="${cx}" y2="${armE}" stroke="${col}" stroke-width=".7" stroke-dasharray="2.5,2.5"/>`;
    const iconY=MID_Y+sign*(cfg.tick+cfg.arm);
    out+=`<text x="${cx}" y="${iconY+cfg.iconDY}" text-anchor="middle" font-size="${cfg.iconSize}" font-family="sans-serif">${etapaIcon(et.nombre)}</text>`;
    const timeY=up?MID_Y-cfg.tick-5:MID_Y+cfg.tick+10;
    out+=`<text x="${cx}" y="${timeY}" text-anchor="middle" font-size="9.5" font-family="Georgia,serif" font-weight="bold" fill="${VINE}">${toAMPM(et.time_ini)}</text>`;
    const nameL=wrapT(et.nombre,ITEM_W-2,cfg.nameSize),musicL=wrapT(et.musica||"",ITEM_W-2,cfg.musicSize);
    const LHN=cfg.nameSize*1.22,LHM=cfg.musicSize*1.28,blockH=nameL.length*LHN+musicL.length*LHM+3;
    let ny=up?iconY-cfg.iconSize-3-blockH+LHN:iconY+cfg.iconSize+7;
    nameL.forEach((ln,li)=>{out+=`<text x="${cx}" y="${ny+li*LHN}" text-anchor="middle" font-size="${cfg.nameSize}" font-family="Georgia,serif" font-weight="bold" fill="${isAnc?VINE:"#3A2515"}">${ln.toUpperCase()}</text>`});
    musicL.forEach((ln,li)=>{out+=`<text x="${cx}" y="${ny+nameL.length*LHN+2+li*LHM}" text-anchor="middle" font-size="${cfg.musicSize}" font-family="Georgia,serif" font-style="italic" fill="${MUTE}">${ln}</text>`});
  });
  out+=`<text x="${W/2}" y="${H-14}" text-anchor="middle" font-size="16" font-family="Georgia,serif" font-style="italic" fill="${VINE}">Nydia &amp; Octavio</text>`;
  canvas.setAttribute("viewBox",`0 0 ${W} ${H}`);canvas.style.width="100%";canvas.style.height="auto";canvas.innerHTML=out;
}

loadAll();
</script>
